<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canlı Maçlar</title>
  <style>
    :root {
      --bg: #07131f;
      --surface: #0b1726;
      --surface-2: #0f1d2f;
      --surface-3: #13253a;
      --border: rgba(110, 146, 187, 0.18);
      --border-strong: rgba(110, 146, 187, 0.28);
      --text: #edf4ff;
      --text-dim: #8ea2ba;
      --text-soft: #b0c1d8;
      --accent: #ff9e64;
      --accent-alt: #ff6a63;
      --accent-ust: #34d399;
      --accent-blue: #5fa7ff;
      --accent-yellow: #fbbf24;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.26);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(20, 184, 166, 0.12), transparent 22%),
        radial-gradient(circle at top left, rgba(255, 158, 100, 0.10), transparent 18%),
        linear-gradient(180deg, #07131f 0%, #091423 46%, #08111d 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      width: calc(100% - 4px);
      max-width: none;
      margin: 2px auto 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px;
      border-radius: 22px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      background: rgba(14, 26, 42, 0.96);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 10px #34d399;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 9px 14px;
      border-radius: 12px;
      background: rgba(15, 29, 47, 0.9);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: rgba(25, 45, 70, 0.95); border-color: var(--border-strong); }
    .btn.primary { background: rgba(52, 211, 153, 0.15); border-color: rgba(52, 211, 153, 0.45); color: var(--accent-ust); }
    .btn.primary:hover { background: rgba(52, 211, 153, 0.25); }
    .btn:disabled { opacity: 0.55; cursor: progress; pointer-events: none; }

    .section-shell { padding: 0 4px; }

    .panel {
      background: rgba(14, 26, 42, 0.96);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--text-dim);
    }
    .meta .dot { color: var(--accent-ust); font-weight: 800; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .stat-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
    .stat-value { font-size: 22px; font-weight: 900; margin-top: 2px; display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-strong);
      background: rgba(15, 29, 47, 0.9);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:hover { background: rgba(25, 45, 70, 0.45); }
    tbody tr.locked { opacity: 0.55; }

    .match-cell { min-width: 220px; }
    .match-cell .match-name {
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .match-cell .match-name:hover { color: var(--accent); }
    .match-cell .tournament {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .status-pill-cell {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(95, 167, 255, 0.12);
      border: 1px solid rgba(95, 167, 255, 0.30);
      color: var(--accent-blue);
      font-size: 12px;
      font-weight: 700;
    }
    .status-pill-cell.q4 { background: rgba(255, 106, 99, 0.12); border-color: rgba(255, 106, 99, 0.35); color: var(--accent-alt); }
    .status-pill-cell.ht { background: rgba(251, 191, 36, 0.14); border-color: rgba(251, 191, 36, 0.4); color: var(--accent-yellow); }

    .num-cell {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }
    .num-cell.fair { color: var(--accent-yellow); }
    .num-cell.projection { color: var(--accent-blue); }
    .num-cell.live { color: var(--accent-ust); }

    .delta-up { color: var(--accent-alt); font-weight: 700; }
    .delta-down { color: var(--accent-ust); font-weight: 700; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 6px;
    }
    .badge.alt { background: rgba(255, 106, 99, 0.15); color: var(--accent-alt); }
    .badge.ust { background: rgba(52, 211, 153, 0.15); color: var(--accent-ust); }
    .badge.lock { background: rgba(110, 146, 187, 0.15); color: var(--text-dim); }

    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-dim);
    }
    .empty-state h3 { color: var(--text); margin-bottom: 8px; font-size: 17px; }

    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .spin {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-ust);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .error-banner {
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255, 106, 99, 0.12);
      border: 1px solid rgba(255, 106, 99, 0.35);
      color: #ffb4ad;
      font-size: 13px;
      margin-bottom: 14px;
    }

    @media (max-width: 720px) {
      .stat-value { font-size: 18px; }
      thead th, tbody td { padding: 8px 10px; font-size: 12px; }
      .match-cell { min-width: 160px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="status-pill"></div>
        <span style="font-size:20px;font-weight:900;letter-spacing:-0.03em;">🏀 Basket Sinyal</span>
      </div>
      <div class="actions">
        <a href="/" class="btn">Sinyaller</a>
        <span class="btn primary">Canlı Maçlar</span>
        <a href="/deleted-matches" class="btn">Silinen</a>
        <a href="/bankroll" class="btn">Bankroll</a>
        <button class="btn" onclick="loadSnapshot()">Yenile</button>
        <button class="btn primary" id="manualFetchBtn" onclick="manualFetch()">Manuel Çek</button>
      </div>
    </header>

    <main class="section-shell">
      <section class="panel">
        <div class="header">
          <h1>Canlı Maçlar</h1>
          <div class="meta">
            <div><span class="spin"></span><span id="liveStatus">Yükleniyor…</span></div>
            <div>Son güncelleme: <span class="dot" id="lastUpdate">-</span></div>
            <div>Çevrim süresi: <span id="cycleDuration">-</span></div>
            <div>Maç sayısı: <span id="matchCount">0</span></div>
          </div>
        </div>

        <div id="errorBanner" class="error-banner" style="display:none;"></div>

        <div class="stats">
          <div class="stat-chip">
            <span class="stat-label">Canlı Maç</span>
            <strong class="stat-value" id="statTotal">0</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Üst Taraf Değer</span>
            <strong class="stat-value" id="statUst">0</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Alt Taraf Değer</span>
            <strong class="stat-value" id="statAlt">0</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Kilitli Barem</span>
            <strong class="stat-value" id="statLocked">0</strong>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Maç / Lig</th>
                <th>Durum</th>
                <th>Skor</th>
                <th style="text-align:right;">Açılış</th>
                <th style="text-align:right;">Canlı</th>
                <th style="text-align:right;">Adil</th>
                <th style="text-align:right;">Projeksiyon</th>
                <th>Değer</th>
              </tr>
            </thead>
            <tbody id="matchesBody">
              <tr><td colspan="8" class="empty-state">Veri bekleniyor…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    const REFRESH_MS = 5000;
    let refreshTimer = null;

    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    function formatNumber(v, digits = 1) {
      if (v === null || v === undefined || v === '') return '-';
      const n = Number(v);
      if (!Number.isFinite(n)) return '-';
      return n.toFixed(digits);
    }

    function formatDelta(a, b) {
      if (a === null || a === undefined || b === null || b === undefined) return '';
      const d = Number(a) - Number(b);
      if (!Number.isFinite(d)) return '';
      if (Math.abs(d) < 0.05) return '<span style="color:var(--text-dim)">±0.0</span>';
      const cls = d > 0 ? 'delta-up' : 'delta-down';
      const sign = d > 0 ? '+' : '';
      return `<span class="${cls}">${sign}${d.toFixed(1)}</span>`;
    }

    function statusClass(label, period) {
      const lower = (label || '').toLowerCase();
      if (lower.includes('devre') || lower.includes('ht')) return 'ht';
      if (period === 4) return 'q4';
      return '';
    }

    function buildValueBadge(row) {
      if (row.market_locked) {
        return '<span class="badge lock">Kilitli</span>';
      }
      const fair = row.fair_line;
      const live = row.inplay_total;
      if (fair === null || fair === undefined || live === null || live === undefined) {
        return '<span style="color:var(--text-dim)">-</span>';
      }
      const edge = Number(fair) - Number(live);
      if (!Number.isFinite(edge)) return '<span style="color:var(--text-dim)">-</span>';
      if (Math.abs(edge) < 2) return '<span class="badge lock">Nötr</span>';
      return edge > 0
        ? `<span class="badge ust">ÜST değer +${edge.toFixed(1)}</span>`
        : `<span class="badge alt">ALT değer ${edge.toFixed(1)}</span>`;
    }

    function render(payload) {
      const matches = Array.isArray(payload.matches) ? payload.matches : [];
      const body = document.getElementById('matchesBody');

      const errorBanner = document.getElementById('errorBanner');
      if (payload.status === 'error' || payload.status === 'pending') {
        errorBanner.style.display = 'block';
        errorBanner.textContent = payload.error || 'Bilinmeyen durum';
      } else {
        errorBanner.style.display = 'none';
      }

      document.getElementById('statTotal').textContent = matches.length;
      document.getElementById('statLocked').textContent = matches.filter(m => m.market_locked).length;

      let countUst = 0, countAlt = 0;
      matches.forEach(m => {
        if (m.market_locked || m.fair_line === null || m.inplay_total === null) return;
        const edge = Number(m.fair_line) - Number(m.inplay_total);
        if (!Number.isFinite(edge)) return;
        if (edge >= 2) countUst += 1;
        else if (edge <= -2) countAlt += 1;
      });
      document.getElementById('statUst').textContent = countUst;
      document.getElementById('statAlt').textContent = countAlt;

      document.getElementById('matchCount').textContent = matches.length;
      document.getElementById('liveStatus').textContent =
        payload.status === 'ok' ? 'Canlı' : (payload.status || '-');

      if (payload.generated_at) {
        const d = new Date(payload.generated_at);
        const now = new Date();
        const diffSec = Math.max(0, Math.round((now - d) / 1000));
        document.getElementById('lastUpdate').textContent =
          diffSec < 60 ? `${diffSec}s önce` : `${Math.round(diffSec / 60)}dk önce`;
      } else {
        document.getElementById('lastUpdate').textContent = '-';
      }
      document.getElementById('cycleDuration').textContent =
        payload.cycle_duration_seconds !== undefined && payload.cycle_duration_seconds !== null
          ? `${payload.cycle_duration_seconds}s`
          : '-';

      if (!matches.length) {
        body.innerHTML = `<tr><td colspan="8" class="empty-state">
          <h3>Canlı maç bulunamadı</h3>
          <p>Worker çalışıyor mu kontrol et: <code>python live_matches_worker.py</code></p>
        </td></tr>`;
        return;
      }

      body.innerHTML = matches.map(m => {
        const statusCls = statusClass(m.status_label, m.period);
        const matchLink = m.url
          ? `<a class="match-name" href="${escapeHtml(m.url)}" target="_blank" rel="noopener">${escapeHtml(m.match_name)}</a>`
          : `<span class="match-name">${escapeHtml(m.match_name)}</span>`;

        return `
          <tr class="${m.market_locked ? 'locked' : ''}">
            <td class="match-cell">
              ${matchLink}
              <span class="tournament">${escapeHtml(m.tournament)}</span>
            </td>
            <td><span class="status-pill-cell ${statusCls}">${escapeHtml(m.status_label || m.status_raw || '-')}</span></td>
            <td style="font-weight:700;">${escapeHtml(m.score || '-')}</td>
            <td class="num-cell">${formatNumber(m.opening_total)}</td>
            <td class="num-cell live">${formatNumber(m.inplay_total)} ${formatDelta(m.inplay_total, m.opening_total)}</td>
            <td class="num-cell fair">${formatNumber(m.fair_line)}</td>
            <td class="num-cell projection">${formatNumber(m.projected_total)}</td>
            <td>${buildValueBadge(m)}</td>
          </tr>
        `;
      }).join('');
    }

    async function loadSnapshot() {
      try {
        const res = await fetch('/api/live-matches', { cache: 'no-store' });
        const payload = await res.json();
        render(payload);
      } catch (e) {
        const errorBanner = document.getElementById('errorBanner');
        errorBanner.style.display = 'block';
        errorBanner.textContent = `Snapshot yüklenemedi: ${e}`;
      }
    }

    async function manualFetch() {
      const btn = document.getElementById('manualFetchBtn');
      const originalText = btn.textContent;
      const errorBanner = document.getElementById('errorBanner');
      btn.disabled = true;
      btn.textContent = 'Çekiliyor…';
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
      try {
        const res = await fetch('/api/live-matches/refresh', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          cache: 'no-store',
        });
        const payload = await res.json();
        if (!res.ok) {
          errorBanner.style.display = 'block';
          errorBanner.textContent = payload.error || `Manuel çekim başarısız (${res.status}).`;
        }
        render(payload);
      } catch (e) {
        errorBanner.style.display = 'block';
        errorBanner.textContent = `Manuel çekim başarısız: ${e}`;
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
        schedule();
      }
    }

    function schedule() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(loadSnapshot, REFRESH_MS);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadSnapshot();
      schedule();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
      } else {
        loadSnapshot();
        schedule();
      }
    });
  </script>
</body>
</html>
