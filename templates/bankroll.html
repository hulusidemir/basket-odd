<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 Bankroll Yönetimi — Kümülatif İddia</title>
  <style>
    :root {
      --bg: #07131f;
      --surface: #0b1726;
      --surface-2: #0f1d2f;
      --surface-3: #13253a;
      --surface-4: #182c44;
      --border: rgba(110, 146, 187, 0.18);
      --border-strong: rgba(110, 146, 187, 0.28);
      --text: #edf4ff;
      --text-dim: #8ea2ba;
      --accent-green: #34d399;
      --accent-red: #ff6a63;
      --accent-blue: #5fa7ff;
      --accent-yellow: #fbbf24;
      --accent-orange: #ff9e64;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.26);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(20, 184, 166, 0.12), transparent 22%),
        radial-gradient(circle at top left, rgba(255, 158, 100, 0.10), transparent 18%),
        linear-gradient(180deg, #07131f 0%, #091423 46%, #08111d 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      width: calc(100% - 4px);
      max-width: none;
      margin: 2px auto 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      border-radius: var(--radius-xl);
      background: rgba(10, 22, 36, 0.94);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(17, 31, 48, 0.95);
      border: 1px solid var(--border);
    }

    .status-pill::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 0 6px rgba(74, 222, 128, 0.12);
    }

    .top-action,
    .nav-link,
    .btn,
    .preset-btn,
    .proj-btn,
    .step-btn {
      border: 1px solid var(--border-strong);
      background: rgba(19, 37, 58, 0.94);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .top-action,
    .nav-link {
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .top-action:hover,
    .nav-link:hover,
    .btn:hover,
    .preset-btn:hover,
    .proj-btn:hover,
    .step-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(95, 167, 255, 0.45);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.18);
    }

    .top-action.active {
      background: rgba(95, 167, 255, 0.15);
      border-color: rgba(95, 167, 255, 0.38);
      color: #a8d4ff;
    }

    .top-action.primary {
      background: rgba(25, 52, 81, 0.96);
    }

    .top-action.danger {
      background: rgba(84, 38, 51, 0.95);
      border-color: rgba(255, 126, 126, 0.24);
    }

    .section-shell {
      background: rgba(10, 22, 36, 0.96);
      border: 1px solid var(--border);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .nav-tab {
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(18, 31, 48, 0.95);
      border: 1px solid transparent;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-tab.active {
      background: linear-gradient(180deg, #ffb37c, #ff9960);
      color: #1a1b22;
      box-shadow: 0 14px 24px rgba(255, 158, 100, 0.18);
    }

    .setup-panel,
    .presets,
    .summary-bar,
    .groups-container {
      background: rgba(18, 30, 47, 0.94);
      border: 1px solid var(--border);
      border-radius: 24px;
    }

    .setup-panel {
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }

    .setup-group { display: flex; flex-direction: column; gap: 4px; }

    .setup-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      font-weight: 700;
    }

    .setup-group input, .setup-group select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(11, 24, 38, 1);
      color: var(--text);
      font-size: 14px;
      outline: none;
      min-width: 120px;
    }

    .setup-group input:focus, .setup-group select:focus { border-color: var(--accent-blue); }

    .btn {
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .btn-primary { background: rgba(25, 52, 81, 0.96); color: #fff; }
    .btn-danger { background: rgba(84, 38, 51, 0.95); color: #ffc0c0; border-color: rgba(255, 126, 126, 0.24); }

    .presets {
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .presets span { font-size: 12px; color: var(--text-dim); margin-right: 4px; font-weight: 700; }

    .preset-btn {
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .preset-btn.active {
      background: linear-gradient(180deg, #ffb37c, #ff9960);
      border-color: transparent;
      color: #1a1b22;
    }

    .summary-bar {
      padding: 14px;
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 20px;
      background: rgba(13, 28, 44, 0.98);
      border: 1px solid var(--border);
    }

    .summary-item .val { font-weight: 700; }
    .summary-item.green .val { color: var(--accent-green); }
    .summary-item.red .val { color: var(--accent-red); }
    .summary-item.blue .val { color: var(--accent-blue); }
    .summary-item.yellow .val { color: var(--accent-yellow); }

    .groups-container {
      padding: 14px;
      display: flex;
      gap: 14px;
      overflow-x: auto;
    }

    .groups-container > .group-column {
      flex: 1 1 0;
      min-width: 280px;
    }

    .group-column {
      background: rgba(13, 28, 44, 0.98);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .group-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .group-title {
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .group-title .group-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent-blue);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .group-balance {
      font-size: 13px;
      color: var(--accent-green);
      font-weight: 600;
    }

    .group-status-lost .group-balance { color: var(--accent-red); }
    .group-status-lost { border-color: rgba(255, 126, 126, 0.24); }
    .group-status-lost .group-header { background: rgba(88, 36, 48, 0.35); }

    .steps-list { padding: 8px; }

    .step-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 4px;
      transition: background 0.15s, border-color 0.15s;
      flex-wrap: wrap;
      background: rgba(11, 24, 38, 0.56);
      border: 1px solid transparent;
    }

    .step-row:hover { background: rgba(17, 32, 49, 0.72); }

    .step-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(110, 146, 187, 0.14);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .step-info { flex: 1; min-width: 120px; }
    .step-amount { font-weight: 700; font-size: 14px; }
    .step-target { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    .step-rate-input {
      width: 60px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(7, 19, 31, 1);
      color: var(--text);
      font-size: 12px;
      text-align: center;
      outline: none;
    }

    .step-rate-input:focus { border-color: var(--accent-blue); }

    .step-note-input {
      width: 140px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(7, 19, 31, 1);
      color: var(--text);
      font-size: 12px;
      outline: none;
    }

    .step-note-input::placeholder { color: var(--text-dim); }
    .step-note-input:focus { border-color: var(--accent-blue); }

    .step-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .step-btn {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
    }

    .step-btn-win { background: rgba(52, 211, 153, 0.12); color: var(--accent-green); border-color: rgba(52, 211, 153, 0.18); }
    .step-btn-lose { background: rgba(255, 106, 99, 0.12); color: var(--accent-red); border-color: rgba(255, 106, 99, 0.18); }
    .step-btn-undo { background: rgba(19, 37, 58, 0.94); color: var(--text-dim); }

    .step-row.won { background: rgba(52, 211, 153, 0.08); border-color: rgba(52, 211, 153, 0.12); }
    .step-row.won .step-num { background: var(--accent-green); color: #fff; }
    .step-row.lost { background: rgba(255, 106, 99, 0.08); border-color: rgba(255, 106, 99, 0.12); }
    .step-row.lost .step-num { background: var(--accent-red); color: #fff; }
    .step-row.active { background: rgba(95, 167, 255, 0.08); border: 1px solid rgba(95, 167, 255, 0.18); }
    .step-row.active .step-num { background: var(--accent-blue); color: #fff; }

    .proj-btn {
      padding: 6px 10px;
      border-radius: 12px;
      border-color: rgba(95, 167, 255, 0.22);
      background: rgba(36, 74, 111, 0.98);
      color: var(--accent-blue);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .proj-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 18, 0.72);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .proj-modal {
      background: rgba(10, 22, 36, 0.98);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 380px;
      max-width: 92vw;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .proj-modal-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      font-size: 15px;
    }

    .proj-modal-close {
      background: rgba(19, 37, 58, 0.96);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
    }

    .proj-modal-close:hover { color: var(--text); }
    .proj-modal-body {
      padding: 12px 16px;
    }

    .proj-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
    }

    .proj-row:last-child { border-bottom: none; }
    .proj-row .proj-label { color: var(--text-dim); }
    .proj-row .proj-val { color: var(--accent-green); font-weight: 600; }

    .save-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 12px;
      background: var(--accent-green);
      color: #07131f;
      font-size: 12px;
      font-weight: 800;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    .save-indicator.show { opacity: 1; }

    @media (max-width: 1100px) {
    }

    @media (max-width: 768px) {
      .app-shell {
        width: calc(100% - 4px);
        margin: 2px auto 12px;
      }

      .topbar,
      .section-shell,
      .setup-panel,
      .presets,
      .summary-bar,
      .groups-container {
        border-radius: 20px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .topbar-left,
      .topbar-right {
        justify-content: space-between;
      }

      .setup-panel { flex-direction: column; align-items: stretch; }
      .setup-group input, .setup-group select { min-width: unset; }
      .groups-container { flex-direction: column; }
      .groups-container > .group-column { min-width: unset; }
      .step-note-input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="topbar-left">
        <div class="status-pill"></div>
        <span style="font-size:20px;font-weight:900;letter-spacing:-0.03em;">🏀 Basket Sinyal</span>
      </div>
      <div class="topbar-right">
        <a href="/" class="top-action">Canlı</a>
        <a href="/live-matches" class="top-action">Canlı Maçlar</a>
        <a href="/deleted-matches" class="top-action">Silinen</a>
        <a href="/bankroll" class="top-action active">Bankroll</a>
      </div>
    </div>

    <div class="section-shell">
      <div class="nav-tabs"></div>

  <!-- Setup -->
  <div class="setup-panel" id="setupPanel">
    <div class="setup-group">
      <label>Toplam Bütçe (₺)</label>
      <input type="number" id="inputBudget" value="20000" min="1" step="100">
    </div>
    <div class="setup-group">
      <label>Grup Sayısı</label>
      <select id="inputGroups">
        <option value="1">1 Grup</option>
        <option value="2">2 Grup</option>
        <option value="3">3 Grup</option>
        <option value="4" selected>4 Grup</option>
        <option value="5">5 Grup</option>
        <option value="6">6 Grup</option>
        <option value="8">8 Grup</option>
        <option value="10">10 Grup</option>
      </select>
    </div>
    <div class="setup-group">
      <label>Varsayılan Oran (bahis oranı · toplam çarpanı)</label>
      <input type="number" id="inputRate" value="2.00" min="1.01" max="50" step="0.05">
    </div>
    <div class="setup-group">
      <label>Oturum Adı</label>
      <input type="text" id="inputName" placeholder="Örn: Akşam Maçları" style="min-width:160px;">
    </div>
    <button class="btn btn-primary" onclick="startSession()">🚀 Oturumu Başlat</button>
    <button class="btn btn-danger" onclick="resetSession()">🔄 Sıfırla</button>
    <button class="btn btn-danger" onclick="clearAllSessions()" style="margin-left:auto;">🧹 Tümünü Sil</button>
  </div>

  <!-- Saved Sessions Bar -->
  <div class="presets" id="sessionsBar">
    <span>Kayıtlı Oturumlar:</span>
    <div id="sessionsList" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>

  <!-- Presets -->
  <div class="presets" id="presetsBar" style="display:none;">
    <span>Hızlı Oran:</span>
    <button class="preset-btn" onclick="applyPresetRate(1.50)">×1.50</button>
    <button class="preset-btn" onclick="applyPresetRate(1.80)">×1.80</button>
    <button class="preset-btn active" onclick="applyPresetRate(2.00)">×2.00</button>
    <button class="preset-btn" onclick="applyPresetRate(2.50)">×2.50</button>
    <button class="preset-btn" onclick="applyPresetRate(3.00)">×3.00</button>
    <button class="preset-btn" onclick="applyPresetRate(4.00)">×4.00</button>
    <button class="preset-btn" onclick="applyPresetRate(5.00)">×5.00</button>
  </div>

  <!-- Summary -->
  <div class="summary-bar" id="summaryBar" style="display:none;">
    <div class="summary-item blue">Başlangıç: <span class="val" id="sumStart">0 ₺</span></div>
    <div class="summary-item green">Güncel Toplam: <span class="val" id="sumCurrent">0 ₺</span></div>
    <div class="summary-item yellow">Kâr: <span class="val" id="sumProfit">0 ₺</span></div>
    <div class="summary-item">Kazanma: <span class="val" id="sumWins">0</span></div>
    <div class="summary-item red">Kaybetme: <span class="val" id="sumLosses">0</span></div>
  </div>

  <!-- Groups -->
  <div class="groups-container" id="groupsContainer"></div>
    </div>
  </div>

  <!-- Save indicator -->
  <div class="save-indicator" id="saveIndicator">✓ Kaydedildi</div>

  <script>
    // ── State ────────────────────────────────────────
    let state = {
      id: null,        // DB id (null = unsaved)
      name: '',
      budget: 20000,
      groupCount: 4,
      defaultRate: 2.00,
      started: false,
      groups: []
    };

    // ── API Persistence ────────────────────────────────
    async function saveState() {
      const payload = {
        id: state.id,
        name: state.name || ('Oturum ' + new Date().toLocaleDateString('tr-TR')),
        budget: state.budget,
        group_count: state.groupCount,
        default_rate: state.defaultRate,
        state: { budget: state.budget, groupCount: state.groupCount, defaultRate: state.defaultRate, started: state.started, groups: state.groups }
      };
      const res = await fetch('/api/bankroll/sessions', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      const data = await res.json();
      if (data.id) state.id = data.id;
      showSaveIndicator();
      loadSessionsList();
    }

    async function loadSessionsList() {
      const res = await fetch('/api/bankroll/sessions');
      const sessions = await res.json();
      const container = document.getElementById('sessionsList');
      if (!sessions.length) {
        container.innerHTML = '<span style="color:var(--text-dim);font-size:12px;">Henüz kayıt yok</span>';
        return;
      }
      container.innerHTML = sessions.map(s => {
        const isActive = state.id === s.id;
        const parsed = JSON.parse(s.state_json);
        const label = s.name || ('Oturum #' + s.id);
        return `<div style="display:flex;align-items:center;gap:2px;">
          <button class="preset-btn ${isActive ? 'active' : ''}" onclick="loadSession(${s.id})" title="${s.budget.toLocaleString('tr-TR')} ₺ / ${s.group_count} grup">${label}</button>
          <button onclick="deleteSession(${s.id})" style="background:none;border:none;color:var(--accent-red);cursor:pointer;font-size:14px;padding:2px 4px;" title="Sil">×</button>
        </div>`;
      }).join('');
    }

    async function loadSession(sid) {
      const res = await fetch('/api/bankroll/sessions');
      const sessions = await res.json();
      const s = sessions.find(x => x.id === sid);
      if (!s) return;
      const parsed = JSON.parse(s.state_json);
      state = { id: s.id, name: s.name, budget: parsed.budget, groupCount: parsed.groupCount, defaultRate: parsed.defaultRate, started: parsed.started, groups: parsed.groups || [] };
      renderAll();
      loadSessionsList();
    }

    async function deleteSession(sid) {
      if (!confirm('Bu oturum silinecek. Emin misiniz?')) return;
      await fetch('/api/bankroll/sessions/' + sid, { method: 'DELETE' });
      if (state.id === sid) {
        state = { id: null, name: '', budget: 20000, groupCount: 4, defaultRate: 2.00, started: false, groups: [] };
        renderAll();
      }
      loadSessionsList();
    }

    async function clearAllSessions() {
      if (!confirm('TÜM oturumlar silinecek. Emin misiniz?')) return;
      await fetch('/api/bankroll/sessions/clear', { method: 'POST' });
      state = { id: null, name: '', budget: 20000, groupCount: 4, defaultRate: 2.00, started: false, groups: [] };
      renderAll();
      loadSessionsList();
    }

    function showSaveIndicator() {
      const el = document.getElementById('saveIndicator');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1200);
    }

    // ── Session Control ────────────────────────────────
    function startSession() {
      const budget = parseFloat(document.getElementById('inputBudget').value);
      const groupCount = parseInt(document.getElementById('inputGroups').value);
      const rate = parseFloat(document.getElementById('inputRate').value);

      if (!budget || budget <= 0 || !groupCount || !rate || rate <= 0) {
        alert('Lütfen geçerli değerler girin.');
        return;
      }

      const perGroup = budget / groupCount;

      state.id = null;  // Always create a new session
      state.name = document.getElementById('inputName').value.trim() || ('Oturum ' + new Date().toLocaleDateString('tr-TR'));
      state.budget = budget;
      state.groupCount = groupCount;
      state.defaultRate = rate;
      state.started = true;
      state.groups = [];

      for (let i = 0; i < groupCount; i++) {
        state.groups.push({
          steps: [{
            amount: perGroup,
            rate: rate,
            status: 'pending',  // pending | won | lost
            note: ''
          }]
        });
      }

      saveState();
      renderAll();
    }

    function resetSession() {
      if (!confirm('Yeni boş oturum başlatılacak. Emin misiniz?')) return;
      state = { id: null, name: '', budget: 20000, groupCount: 4, defaultRate: 2.00, started: false, groups: [] };
      renderAll();
    }

    // ── Actions ────────────────────────────────────────
    function markWin(groupIdx, stepIdx) {
      const group = state.groups[groupIdx];
      const step = group.steps[stepIdx];
      step.status = 'won';

      // Only add next step if this is the last step
      if (stepIdx === group.steps.length - 1) {
        const newAmount = step.amount * step.rate;
        group.steps.push({
          amount: newAmount,
          rate: state.defaultRate,
          status: 'pending',
          note: ''
        });
      }

      saveState();
      renderAll();
    }

    function markLoss(groupIdx, stepIdx) {
      const group = state.groups[groupIdx];
      group.steps[stepIdx].status = 'lost';
      saveState();
      renderAll();
    }

    function undoStep(groupIdx, stepIdx) {
      const group = state.groups[groupIdx];
      const step = group.steps[stepIdx];

      // If this step was won and there's a next pending step, remove it
      if (step.status === 'won' && stepIdx === group.steps.length - 2) {
        const nextStep = group.steps[stepIdx + 1];
        if (nextStep.status === 'pending') {
          group.steps.pop();
        }
      }

      step.status = 'pending';
      saveState();
      renderAll();
    }

    function updateStepRate(groupIdx, stepIdx, newRate) {
      const rate = parseFloat(newRate);
      if (isNaN(rate) || rate <= 0) return;
      state.groups[groupIdx].steps[stepIdx].rate = rate;
      saveState();
      renderAll();
    }

    function updateStepNote(groupIdx, stepIdx, note) {
      state.groups[groupIdx].steps[stepIdx].note = note;
      saveState();
    }

    function deleteGroup(groupIdx) {
      if (!confirm(`Grup ${groupIdx + 1} silinecek. Emin misiniz?`)) return;
      state.groups.splice(groupIdx, 1);
      state.groupCount = state.groups.length;
      if (state.groups.length === 0) {
        state.started = false;
      }
      saveState();
      renderAll();
    }

    function applyPresetRate(rate) {
      document.getElementById('inputRate').value = rate;
      state.defaultRate = rate;

      // Update active preset button
      document.querySelectorAll('.preset-btn').forEach(b => {
        b.classList.toggle('active', parseFloat(b.textContent.replace('×', '')) === rate);
      });

      saveState();
    }

    // ── Helpers ─────────────────────────────────────
    function fmt(n) {
      return n.toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ₺';
    }

    function getGroupStatus(group) {
      const lastStep = group.steps[group.steps.length - 1];
      if (lastStep.status === 'lost') return 'lost';
      return 'active';
    }

    function getGroupCurrentBalance(group) {
      const lastStep = group.steps[group.steps.length - 1];
      if (lastStep.status === 'won') {
        return lastStep.amount * lastStep.rate;
      }
      if (lastStep.status === 'lost') return 0;
      return lastStep.amount;
    }

    function showProjection(groupIdx) {
      const group = state.groups[groupIdx];
      const balance = getGroupCurrentBalance(group);
      const rate = state.defaultRate;
      const milestones = Array.from({length: 20}, (_, i) => i + 1);

      let rows = '';
      milestones.forEach(n => {
        const projected = balance * Math.pow(rate, n);
        rows += `<div class="proj-row"><span class="proj-label">${n}. maç →</span><span class="proj-val">${fmt(projected)}</span></div>`;
      });

      const overlay = document.createElement('div');
      overlay.className = 'proj-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      overlay.innerHTML = `
        <div class="proj-modal">
          <div class="proj-modal-header">
            <span>📈 Grup ${groupIdx + 1} — Projeksiyon (×${rate.toFixed(2)})</span>
            <button class="proj-modal-close" onclick="this.closest('.proj-overlay').remove()">&times;</button>
          </div>
          <div class="proj-modal-body">
            <div class="proj-row" style="font-weight:600;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:4px;">
              <span>Mevcut Bakiye</span><span class="proj-val">${fmt(balance)}</span>
            </div>
            ${rows}
          </div>
        </div>`;
      document.body.appendChild(overlay);
    }

    // ── Render ──────────────────────────────────────
    function renderAll() {
      const container = document.getElementById('groupsContainer');
      const summaryBar = document.getElementById('summaryBar');
      const presetsBar = document.getElementById('presetsBar');

      if (!state.started || state.groups.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-dim);font-size:15px;">Oturum başlatmak için yukarıdaki ayarları yapın ve <b>Oturumu Başlat</b> butonuna basın.</div>';
        summaryBar.style.display = 'none';
        presetsBar.style.display = 'none';

        // Restore inputs from state
        document.getElementById('inputBudget').value = state.budget;
        document.getElementById('inputGroups').value = state.groupCount;
        document.getElementById('inputRate').value = state.defaultRate;
        return;
      }

      // Show bars
      summaryBar.style.display = 'flex';
      presetsBar.style.display = 'flex';

      // Update setup inputs to reflect state
      document.getElementById('inputBudget').value = state.budget;
      document.getElementById('inputGroups').value = state.groupCount;
      document.getElementById('inputRate').value = state.defaultRate;

      // Flex layout — no grid columns needed, all side by side

      // Render groups
      let html = '';
      let totalCurrent = 0;
      let totalWins = 0;
      let totalLosses = 0;

      state.groups.forEach((group, gi) => {
        const gStatus = getGroupStatus(group);
        const balance = getGroupCurrentBalance(group);
        totalCurrent += balance;

        const statusClass = gStatus === 'lost' ? 'group-status-lost' : '';

        html += `<div class="group-column ${statusClass}">`;
        html += `<div class="group-header">`;
        html += `<div class="group-title"><span class="group-num">${gi + 1}</span> Grup ${gi + 1}</div>`;
        html += `<div style="display:flex;align-items:center;gap:8px;">`;
        if (gStatus !== 'lost') html += `<button class="proj-btn" onclick="showProjection(${gi})">📈 Projeksiyon</button>`;
        html += `<button class="proj-btn" style="border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.1);color:var(--accent-red);" onclick="deleteGroup(${gi})">🗑️</button>`;
        html += `<div class="group-balance">${fmt(balance)}</div>`;
        html += `</div></div>`;
        html += `<div class="steps-list">`;

        group.steps.forEach((step, si) => {
          const isActive = step.status === 'pending';
          const isWon = step.status === 'won';
          const isLost = step.status === 'lost';
          const rowClass = isWon ? 'won' : (isLost ? 'lost' : (isActive ? 'active' : ''));
          const payout = step.amount * step.rate;
          const profit = payout - step.amount;

          if (isWon) totalWins++;
          if (isLost) totalLosses++;

          html += `<div class="step-row ${rowClass}">`;
          html += `<div class="step-num">${si + 1}</div>`;
          html += `<div class="step-info">`;
          html += `<div class="step-amount">${fmt(step.amount)}</div>`;
          html += `<div class="step-target">Net kâr: ${fmt(profit)} → Toplam: ${fmt(payout)}</div>`;
          html += `</div>`;

          // Rate input
          html += `<input class="step-rate-input" type="number" min="1.01" max="50" step="0.05" value="${step.rate}" `;
          html += `onchange="updateStepRate(${gi},${si},this.value)" title="Oran" ${isActive ? '' : 'disabled'}>`;

          // Note input
          html += `<input class="step-note-input" type="text" placeholder="Maç notu..." value="${escapeHtml(step.note)}" `;
          html += `onchange="updateStepNote(${gi},${si},this.value)" ${isActive ? '' : 'disabled'}>`;

          // Action buttons
          html += `<div class="step-actions">`;
          if (isActive) {
            html += `<button class="step-btn step-btn-win" onclick="markWin(${gi},${si})">✅ Kazandı</button>`;
            html += `<button class="step-btn step-btn-lose" onclick="markLoss(${gi},${si})">❌ Kaybetti</button>`;
          } else {
            html += `<button class="step-btn step-btn-undo" onclick="undoStep(${gi},${si})">↩ Geri Al</button>`;
          }
          html += `</div>`;
          html += `</div>`;
        });

        html += `</div></div>`;
      });

      container.innerHTML = html;

      // Summary
      const totalProfit = totalCurrent - state.budget;
      document.getElementById('sumStart').textContent = fmt(state.budget);
      document.getElementById('sumCurrent').textContent = fmt(totalCurrent);
      document.getElementById('sumProfit').textContent = (totalProfit >= 0 ? '+' : '') + fmt(totalProfit);
      document.getElementById('sumWins').textContent = totalWins;
      document.getElementById('sumLosses').textContent = totalLosses;

      // Color profit
      const profitEl = document.getElementById('sumProfit').parentElement;
      profitEl.className = 'summary-item ' + (totalProfit >= 0 ? 'green' : 'red');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // ── Init ────────────────────────────────────────
    renderAll();
    loadSessionsList();

    // Responsive re-render
    window.addEventListener('resize', renderAll);
  </script>
</body>
</html>
