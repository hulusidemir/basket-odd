<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏀 Basket Anomali Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e6eb;
      --text-dim: #8b8fa3;
      --accent-alt: #ef4444;
      --accent-ust: #22c55e;
      --accent-blue: #3b82f6;
      --bet-bg: rgba(59, 130, 246, 0.08);
      --ignored-bg: rgba(255,255,255,0.03);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
    }
    .header h1 span { opacity: 0.5; font-weight: 400; }
    .stats {
      display: flex;
      gap: 24px;
      font-size: 14px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .filters {
      padding: 16px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent-blue); color: var(--text); }
    .filter-btn.active {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
    }
    .search-box {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      outline: none;
      width: 200px;
      margin-left: auto;
    }
    .search-box::placeholder { color: var(--text-dim); }
    .search-box:focus { border-color: var(--accent-blue); }

    .table-wrap {
      padding: 16px 32px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      padding: 10px 12px;
      color: var(--text-dim);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--text); }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td {
      padding: 10px 12px;
      white-space: nowrap;
    }

    /* Satır durumları */
    tr.bet-placed {
      background: var(--bet-bg);
      opacity: 0.55;
    }
    tr.bet-placed:hover { opacity: 0.7; }
    tr.is-ignored td.col-match,
    tr.is-ignored td.col-tournament,
    tr.is-ignored td.col-direction {
      text-decoration: line-through;
      opacity: 0.4;
    }

    /* Direction badge */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 12px;
    }
    .badge-alt { background: rgba(239,68,68,0.15); color: var(--accent-alt); }
    .badge-ust { background: rgba(34,197,94,0.15); color: var(--accent-ust); }

    /* Diff highlight */
    .diff-val { font-weight: 700; font-variant-numeric: tabular-nums; }
    .diff-positive { color: var(--accent-alt); }
    .diff-negative { color: var(--accent-ust); }

    /* Action buttons */
    .action-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
      margin-right: 4px;
    }
    .action-btn:hover { border-color: var(--accent-blue); color: var(--text); }
    .action-btn.active-bet {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
    }
    .action-btn.active-ignore {
      background: #6b7280;
      border-color: #6b7280;
      color: #fff;
    }

    .match-link {
      color: var(--accent-blue);
      text-decoration: none;
    }
    .match-link:hover { text-decoration: underline; }

    .time-col { color: var(--text-dim); font-size: 12px; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      font-size: 16px;
    }
    .refresh-info {
      padding: 8px 32px;
      color: var(--text-dim);
      font-size: 11px;
      text-align: right;
    }
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
    }
    .page-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent-blue); color: var(--text); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-btn.active-page {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
    }
    .page-info {
      color: var(--text-dim);
      font-size: 13px;
    }
    .page-size-select {
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏀 Basket Anomali Dashboard <span>— Canlı Barem Takibi</span></h1>
    <div class="stats">
      <div class="stat-item">
        <span class="stat-dot" style="background:var(--accent-alt)"></span>
        <span id="stat-alt">0</span> ALT
      </div>
      <div class="stat-item">
        <span class="stat-dot" style="background:var(--accent-ust)"></span>
        <span id="stat-ust">0</span> ÜST
      </div>
      <div class="stat-item">
        <span class="stat-dot" style="background:var(--accent-blue)"></span>
        <span id="stat-bet">0</span> Bahis Oynandı
      </div>
      <div class="stat-item">
        <span class="stat-dot" style="background:#6b7280"></span>
        <span id="stat-total">0</span> Toplam
      </div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Tümü</button>
    <button class="filter-btn" data-filter="pending">Bekleyen</button>
    <button class="filter-btn" data-filter="bet">Bahis Oynandı</button>
    <button class="filter-btn" data-filter="ignored">Gözardı Edildi</button>
    <button class="filter-btn" data-filter="alt">🔻 ALT</button>
    <button class="filter-btn" data-filter="ust">🔺 ÜST</button>
    <input class="search-box" type="text" placeholder="Takım veya turnuva ara..." id="searchInput">
  </div>

  <div class="refresh-info">
    Otomatik yenileme: <span id="countdown">15</span>s | Son güncelleme: <span id="lastUpdate">-</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-sort="alerted_at">Zaman ▼</th>
          <th data-sort="direction">Sinyal</th>
          <th data-sort="match_name">Maç</th>
          <th data-sort="tournament">Turnuva</th>
          <th data-sort="status">Durum</th>
          <th data-sort="opening">Açılış</th>
          <th data-sort="live">Canlı</th>
          <th data-sort="diff">Fark</th>
          <th>Aksiyon</th>
        </tr>
      </thead>
      <tbody id="alertsBody">
      </tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none;">
      Henüz anomali tespiti yok. Bot çalışırken otomatik olarak güncellenecek.
    </div>
  </div>

  <div class="pagination" id="paginationBar">
    <button class="page-btn" id="prevPage" onclick="changePage(-1)">← Önceki</button>
    <span class="page-info" id="pageInfo">1 / 1</span>
    <button class="page-btn" id="nextPage" onclick="changePage(1)">Sonraki →</button>
    <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize(this.value)">
      <option value="15">15 / sayfa</option>
      <option value="25" selected>25 / sayfa</option>
      <option value="50">50 / sayfa</option>
      <option value="100">100 / sayfa</option>
    </select>
  </div>

  <script>
    let allAlerts = [];
    let currentFilter = 'all';
    let searchQuery = '';
    let sortField = 'alerted_at';
    let sortAsc = false;
    let countdownVal = 15;
    let currentPage = 1;
    let pageSize = 25;

    function cleanMatchName(name) {
      return (name || '')
        .replace(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}\s*/g, '')
        .replace(/\s*betting odds\s*/gi, '')
        .replace(/\s+vs\.?\s+/gi, ' - ')
        .trim() || name;
    }

    // Fetch alerts from API
    async function fetchAlerts() {
      try {
        const res = await fetch('/api/alerts');
        allAlerts = await res.json();
        renderTable();
        updateStats();
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('tr-TR');
      } catch (e) {
        console.error('Fetch error:', e);
      }
    }

    function updateStats() {
      const alt = allAlerts.filter(a => a.direction === 'ALT').length;
      const ust = allAlerts.filter(a => a.direction === 'ÜST').length;
      const bet = allAlerts.filter(a => a.bet_placed).length;
      document.getElementById('stat-alt').textContent = alt;
      document.getElementById('stat-ust').textContent = ust;
      document.getElementById('stat-bet').textContent = bet;
      document.getElementById('stat-total').textContent = allAlerts.length;
    }

    function filterAlerts() {
      let filtered = [...allAlerts];
      // Filter
      if (currentFilter === 'pending') filtered = filtered.filter(a => !a.bet_placed && !a.ignored);
      else if (currentFilter === 'bet') filtered = filtered.filter(a => a.bet_placed);
      else if (currentFilter === 'ignored') filtered = filtered.filter(a => a.ignored);
      else if (currentFilter === 'alt') filtered = filtered.filter(a => a.direction === 'ALT');
      else if (currentFilter === 'ust') filtered = filtered.filter(a => a.direction === 'ÜST');
      // Search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(a =>
          (a.match_name || '').toLowerCase().includes(q) ||
          (a.tournament || '').toLowerCase().includes(q)
        );
      }
      // Sort
      filtered.sort((a, b) => {
        let va = a[sortField], vb = b[sortField];
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ? 1 : -1;
        return 0;
      });
      return filtered;
    }

    function renderTable() {
      const tbody = document.getElementById('alertsBody');
      const empty = document.getElementById('emptyState');
      const filtered = filterAlerts();

      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      const paged = filtered.slice(start, start + pageSize);

      // Update pagination UI
      document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages} (${filtered.length} kayıt)`;
      document.getElementById('prevPage').disabled = currentPage <= 1;
      document.getElementById('nextPage').disabled = currentPage >= totalPages;

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = paged.map(a => {
        const classes = [];
        if (a.bet_placed) classes.push('bet-placed');
        if (a.ignored) classes.push('is-ignored');

        const dirClass = a.direction === 'ALT' ? 'badge-alt' : 'badge-ust';
        const dirIcon = a.direction === 'ALT' ? '🔻' : '🔺';
        const diffClass = a.diff >= 0 ? 'diff-positive' : 'diff-negative';
        const diffSign = a.direction === 'ALT' ? '+' : '-';

        const time = a.alerted_at ? new Date(a.alerted_at + 'Z').toLocaleString('tr-TR', {
          day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
        }) : '-';

        const matchDisplay = a.url
          ? `<a class="match-link" href="${escapeHtml(a.url)}" target="_blank">${escapeHtml(cleanMatchName(a.match_name))}</a>`
          : escapeHtml(cleanMatchName(a.match_name));

        const betBtnClass = a.bet_placed ? 'active-bet' : '';
        const betBtnText = a.bet_placed ? '✓ Bahis Oynandı' : '💰 Bahis Oyna';
        const ignoreBtnClass = a.ignored ? 'active-ignore' : '';
        const ignoreBtnText = a.ignored ? '✓ Gözardı' : '🚫 Gözardı';

        return `<tr class="${classes.join(' ')}">
          <td class="time-col">${time}</td>
          <td><span class="badge ${dirClass}">${dirIcon} ${a.direction}</span></td>
          <td class="col-match">${matchDisplay}</td>
          <td class="col-tournament">${escapeHtml(a.tournament || '-')}</td>
          <td>${escapeHtml(a.status || '-')}</td>
          <td>${a.opening.toFixed(1)}</td>
          <td>${a.live.toFixed(1)}</td>
          <td class="diff-val ${diffClass}">${diffSign}${a.diff.toFixed(1)}</td>
          <td>
            <button class="action-btn ${betBtnClass}" onclick="toggleBet(${a.id})">${betBtnText}</button>
            <button class="action-btn ${ignoreBtnClass}" onclick="toggleIgnore(${a.id})">${ignoreBtnText}</button>
            <button class="action-btn" onclick="deleteAlert(${a.id})" title="Sil" style="color:#ef4444">🗑️</button>
          </td>
        </tr>`;
      }).join('');
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    async function toggleBet(id) {
      await fetch(`/api/alerts/${id}/bet`, { method: 'POST' });
      // Update local data
      const a = allAlerts.find(x => x.id === id);
      if (a) a.bet_placed = a.bet_placed ? 0 : 1;
      renderTable();
      updateStats();
    }

    async function toggleIgnore(id) {
      await fetch(`/api/alerts/${id}/ignore`, { method: 'POST' });
      const a = allAlerts.find(x => x.id === id);
      if (a) a.ignored = a.ignored ? 0 : 1;
      renderTable();
      updateStats();
    }

    async function deleteAlert(id) {
      if (!confirm('Bu kaydı silmek istediğinize emin misiniz?')) return;
      await fetch(`/api/alerts/${id}`, { method: 'DELETE' });
      allAlerts = allAlerts.filter(x => x.id !== id);
      renderTable();
      updateStats();
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        currentPage = 1;
        renderTable();
      });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value;
      currentPage = 1;
      renderTable();
    });

    // Sort headers
    document.querySelectorAll('thead th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const field = th.dataset.sort;
        if (sortField === field) {
          sortAsc = !sortAsc;
        } else {
          sortField = field;
          sortAsc = true;
        }
        renderTable();
      });
    });

    // Pagination controls
    function changePage(delta) {
      currentPage += delta;
      renderTable();
    }
    function changePageSize(val) {
      pageSize = parseInt(val);
      currentPage = 1;
      renderTable();
    }

    // Auto refresh
    fetchAlerts();
    setInterval(() => {
      countdownVal--;
      if (countdownVal <= 0) {
        countdownVal = 15;
        fetchAlerts();
      }
      document.getElementById('countdown').textContent = countdownVal;
    }, 1000);
  </script>
</body>
</html>
